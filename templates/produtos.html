<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
		td,th{
			border: 1px solid black;
		}
	</style>
    <table>
        <h2>Meus produtos ({{qtd}})</h2>
        <tr>
            <th>Nome</th>
            <th>Preço</th>
            <th>Categoria</th>
        </tr>


    {% for i in itens %}
        <tr>
            <td>{{i.nome}}</td>
            <td>{{i.preco}}</td>
            <td>{{i.categoria}}</td>
        </tr>
    {% endfor %}

    </table>
</body>
</html>
